  background: blue;
  transform-style: preserve-3d;
  transform: translateX(var(--tx)) translateY(var(--ty)) rotateX(var(--rx)) rotateZ(var(--tz));

  <canvas id="grid-canvas"></canvas>
  <div id="background"></div>
  <!--웹 타이틀!-->
<h1>DE-PS</h1>
<p>Turn on your cell phone at that time. And turn on Google Maps. Is the blue dot that exists as if it is really you? Does it say exactly where you are? GPS systems are not an absolute exact location, but rather an infinite number of mine-like errors and fierce flagging to address them.</p>

  <div style="height: 6000px;"> </div>



<script>
const background = document.getElementById('background');
const planeSize = 200;
const spacing = 200;
const numX = Math.ceil(window.innerWidth / spacing) + 2;
const numY = Math.ceil(window.innerHeight / spacing) + 2;
for (let i = -1; i < numX; i++) {
  for (let j = -1; j < numY; j++) {
    const plane = document.createElement('div');
    plane.className = 'plane';
    plane.style.setProperty('--tx', i * spacing + 'px');
    plane.style.setProperty('--ty', j * spacing + 'px');
    background.appendChild(plane);
  }
}

let rotateZ = 0;
let rotateX = 45;
let direction = 1;

function animate() {
  rotateZ += direction * 1.5;
  rotateX += direction * 0.75;
  document.documentElement.style.setProperty('--tz', rotateZ + 'deg');
  document.documentElement.style.setProperty('--rx', rotateX + 'deg');
  requestAnimationFrame(animate);
}

animate();

window.addEventListener('wheel', (e) => {
  direction = e.deltaY > 0 ? 1 : -1;
});

// Draw neon grid
const canvas = document.getElementById('grid-canvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  drawGrid();
}

function drawGrid() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  // Neon cyan color
  ctx.strokeStyle = '#00ffff';
  ctx.shadowColor = '#00ffff';
  ctx.shadowBlur = 5;
  ctx.lineWidth = 1;
  
  const gridSpacing = 50;
  
  // Draw vertical lines
  for (let x = 0; x < canvas.width; x += gridSpacing) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, canvas.height);
    ctx.stroke();
  }
  
  // Draw horizontal lines
  for (let y = 0; y < canvas.height; y += gridSpacing) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(canvas.width, y);
    ctx.stroke();
  }
}

resizeCanvas();
window.addEventListener('resize', resizeCanvas);
</script>

</body>
