<body>
  <div class="scene">
    <div class="card" id="flip-card">

<script>
const background = document.getElementById('background');
const planeSize = 200;
const spacing = 200;
const numX = Math.ceil(window.innerWidth / spacing) + 2;
const numY = Math.ceil(window.innerHeight / spacing) + 2;
for (let i = -1; i < numX; i++) {
  for (let j = -1; j < numY; j++) {
    const plane = document.createElement('div');
    plane.className = 'plane';
    plane.style.setProperty('--tx', i * spacing + 'px');
    plane.style.setProperty('--ty', j * spacing + 'px');
    background.appendChild(plane);
  }
}

let rotateZ = 0;
let rotateX = 45;
let direction = 1;

function animate() {
  rotateZ += direction * 1.5;
  rotateX += direction * 0.75;
  document.documentElement.style.setProperty('--tz', rotateZ + 'deg');
  document.documentElement.style.setProperty('--rx', rotateX + 'deg');
  requestAnimationFrame(animate);
}

animate();

window.addEventListener('wheel', (e) => {
  direction = e.deltaY > 0 ? 1 : -1;
});

// Draw neon grid
const canvas = document.getElementById('grid-canvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  drawGrid();
}

function drawGrid() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  // Neon cyan color
  ctx.strokeStyle = '#00ffff';
  ctx.shadowColor = '#00ffff';
  ctx.shadowBlur = 5;
  ctx.lineWidth = 1;
  
  const gridSpacing = 50;
  
  // Draw vertical lines
  for (let x = 0; x < canvas.width; x += gridSpacing) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, canvas.height);
    ctx.stroke();
  }
  
  // Draw horizontal lines
  for (let y = 0; y < canvas.height; y += gridSpacing) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(canvas.width, y);
    ctx.stroke();
  }
}

resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const boardContainer = document.getElementById('ms-board');
const flagToggle = document.getElementById('flag-toggle');

const difficulties = {
  beginner: { rows: 9, cols: 9, mines: 10 },
};

let rows = 9;
let cols = 9;
let mineCount = 10;
let board = [];
let firstMove = true;
let flags = 0;
let gameOver = false;
let flagMode = false;

function startTimer() {
  // timer mode removed; no operation required
}

function stopTimer() {
  // timer mode removed; no operation required
}

function setMessage(text) {
  // status text is hidden; no user-facing description needed
}

function initGame(settings) {
  rows = settings.rows;
  cols = settings.cols;
  mineCount = settings.mines;
  firstMove = true;
  gameOver = false;
  flagMode = true;
  flags = 0;
  board = [];
  setMessage('Flag mode active');
  flagToggle.classList.add('active');
  flagToggle.textContent = 'Flag Mode On';
  boardContainer.style.setProperty('--cols', cols);
  stopTimer();
  createBoard();
  renderBoard();
}

function createBoard() {
  for (let r = 0; r < rows; r++) {
    const row = [];
    for (let c = 0; c < cols; c++) {
      row.push({ mine: false, adjacent: 0, revealed: false, flagged: false });
    }
    board.push(row);
  }
}

function getNeighbors(r, c) {
  const neighbors = [];
  for (let dr = -1; dr <= 1; dr++) {
    for (let dc = -1; dc <= 1; dc++) {
      if (dr === 0 && dc === 0) continue;
      const nr = r + dr;
      const nc = c + dc;
      if (nr >= 0 && nr < rows && nc >= 0 && nc < cols) {
        neighbors.push({ r: nr, c: nc });
      }
    }
  }
  return neighbors;
}

function plantMines(safeRow, safeCol) {
  let planted = 0;
  const safeCells = new Set();
  getNeighbors(safeRow, safeCol).forEach(({ r, c }) => safeCells.add(`${r},${c}`));
  safeCells.add(`${safeRow},${safeCol}`);

  while (planted < mineCount) {
    const r = Math.floor(Math.random() * rows);
    const c = Math.floor(Math.random() * cols);
    const key = `${r},${c}`;
    if (safeCells.has(key) || board[r][c].mine) continue;
    board[r][c].mine = true;
    planted += 1;
  }

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (board[r][c].mine) continue;
      board[r][c].adjacent = getNeighbors(r, c).filter(({ r: nr, c: nc }) => board[nr][nc].mine).length;
    }
  }
}

function revealCell(r, c) {
  if (gameOver) return;
  const cell = board[r][c];
  if (cell.revealed || cell.flagged) return;

  if (firstMove) {
    plantMines(r, c);
    startTimer();
    firstMove = false;
  }

  cell.revealed = true;
  if (cell.mine) {
    gameOver = true;
    setMessage('Game Over');
    stopTimer();
    revealAllMines();
    renderBoard();
    return;
  }

  if (cell.adjacent === 0) {
    floodReveal(r, c);
  }

  if (checkWin()) {
    gameOver = true;
    setMessage('You Win!');
    stopTimer();
    revealAllMines(true);
  }

  renderBoard();
}

function floodReveal(r, c) {
  const cell = board[r][c];
  if (cell.revealed || cell.flagged) return;
  cell.revealed = true;
  if (cell.adjacent !== 0) return;

  getNeighbors(r, c).forEach(({ r: nr, c: nc }) => {
    if (!board[nr][nc].revealed) {
      floodReveal(nr, nc);
    }
  });
}

function toggleFlag(r, c) {
  if (gameOver) return;
  const cell = board[r][c];
  if (cell.revealed) return;
  cell.flagged = !cell.flagged;
  flags += cell.flagged ? 1 : -1;
  updateFlagCount();
  renderBoard();
}

function updateFlagCount() {
  const remaining = Math.max(0, mineCount - flags);
  mineCountEl.textContent = remaining;
}

function revealAllMines(showAll = false) {
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const cell = board[r][c];
      if (cell.mine) {
        cell.revealed = true;
      }
      if (showAll && !cell.mine && cell.flagged) {
        cell.flagged = false;
      }
    }
  }
}

function checkWin() {
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const cell = board[r][c];
      if (!cell.mine && !cell.revealed) {
        return false;
      }
    }
  }
  return true;
}

function renderBoard() {
  boardContainer.innerHTML = '';
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const cell = board[r][c];
      const button = document.createElement('button');
      button.type = 'button';
      button.className = 'ms-cell';
      button.dataset.row = r;
      button.dataset.col = c;
      if (cell.revealed) {
        button.classList.add('revealed');
        if (cell.mine) {
          button.classList.add('mine');
          button.textContent = '💣';
        } else if (cell.adjacent > 0) {
          button.textContent = cell.adjacent;
          button.style.color = ['#8efeff', '#7ad7ff', '#90ff8c', '#ffcc5c', '#ff8c6d', '#e46aff', '#fef57b', '#ffffff'][cell.adjacent - 1] || '#ffffff';
        }
      } else if (cell.flagged) {
        button.classList.add('flagged');
      }
      boardContainer.appendChild(button);
    }
  }
}

boardContainer.addEventListener('click', (event) => {
  const target = event.target;
  if (!target.classList.contains('ms-cell')) return;
  const r = Number(target.dataset.row);
  const c = Number(target.dataset.col);
  if (flagMode) {
    toggleFlag(r, c);
  } else {
    revealCell(r, c);
  }
});

boardContainer.addEventListener('contextmenu', (event) => {
  const target = event.target;
  if (!target.classList.contains('ms-cell')) return;
  event.preventDefault();
  const r = Number(target.dataset.row);
  const c = Number(target.dataset.col);
  toggleFlag(r, c);
});

flagToggle.addEventListener('click', () => {
  flagMode = !flagMode;
  flagToggle.classList.toggle('active', flagMode);
  flagToggle.textContent = flagMode ? 'Flag Mode On' : 'Flag Mode';
  setMessage(flagMode ? 'Flag mode active' : 'Ready');
});

initGame(difficulties.beginner);

const flipCard = document.getElementById('flip-card');
const flipToggle = document.getElementById('flip-toggle');

flipToggle.addEventListener('click', () => {
  flipCard.classList.toggle('is-flipped');
  if (flipCard.classList.contains('is-flipped')) {
    document.body.style.overflow = 'hidden';
    flipToggle.textContent = 'Flip Back';
  } else {
    document.body.style.overflow = '';
    flipToggle.textContent = 'Flip';
  }
});
</script>
