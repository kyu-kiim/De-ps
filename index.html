<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01//EN" "http://www.w3.org/TR/html4/strict.dtd">
<html>
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta http-equiv="Content-Style-Type" content="text/css">
  <title>DE-PS</title>
  <!--웹 브라우징 제목!-->
  <meta name="Generator" content="Cocoa HTML Writer">
  <meta name="CocoaVersion" content="2685.4">
  <style type="text/css">
    body {
      margin: 0;
      padding: 0;

}

#background {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  perspective: 1000px;
  z-index: -1;
  transform-style: preserve-3d;
}

.plane {
  position: absolute;
  width: 200px;
  height: 200px;
  background: black;
  transform-style: preserve-3d;
  animation: rotate 10s linear infinite;
}

@keyframes rotate {
  0% {
    transform: translateX(var(--tx)) translateY(var(--ty)) rotateX(45deg) rotateZ(0deg);
  }
  100% {
    transform: translateX(var(--tx)) translateY(var(--ty)) rotateX(45deg) rotateZ(360deg);
  }
}
    h1 {
      margin: 0;
      padding: 20px;
      color: blue;
      text-align: center;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: white;
      z-index: 1000;
      font-size: 60px;
    }
  </style>
</head>
<body>
  <div id="background"></div>
  <!--웹 타이틀!-->
<h1>DE-PS</h1>

<script>
const background = document.getElementById('background');
const planeSize = 200;
const spacing = 200;
const numX = Math.ceil(window.innerWidth / spacing) + 2;
const numY = Math.ceil(window.innerHeight / spacing) + 2;
for (let i = -1; i < numX; i++) {
  for (let j = -1; j < numY; j++) {
    const plane = document.createElement('div');
    plane.className = 'plane';
    plane.style.setProperty('--tx', i * spacing + 'px');
    plane.style.setProperty('--ty', j * spacing + 'px');
    background.appendChild(plane);
  }
}
</script>

</body>
</html>
