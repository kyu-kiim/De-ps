<script>

const boardContainer = document.getElementById('ms-board');
const flagToggle = document.getElementById('flag-toggle');

let userLocation = null;
if (navigator.geolocation) {
  navigator.geolocation.getCurrentPosition(
    pos => { userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude }; },
    () => {}
  );
}

// Firebase Realtime Database — create a free project at firebase.google.com,
// create a Realtime Database, set rules to { ".read":true, ".write":true }
const FIREBASE_DB_URL = 'https://de-ps-3a0a9-default-rtdb.firebaseio.com/';

function serializeBoard() {
  return board.map(row => row.map(cell => {
    if (cell.flagged) return 'F';
    if (!cell.revealed) return '.';
    if (cell.mine) return 'X';
    return cell.adjacent === 0 ? '_' : String(cell.adjacent);
  }).join('')).join('|');
}

function getClearedItems() {
  const items = [];
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const cell = board[r][c];
      if (cell.mineCleared && cell.hoverItems && cell.hoverItems.bomb) {
        const item = cell.hoverItems.bomb;
        items.push({
          name: item.name || '',
          text: item.text || '',
          type: item.type || '',
          role: item.role || '',
          img: item.img || '',
          link: item.link || ''
        });
      }
    }
  }
  return items;
}

async function saveRecord(lat, lng, boardStr, boardRows, boardCols, clearedItems) {
  if (!FIREBASE_DB_URL.includes('YOUR-PROJECT')) {
    try {
      await fetch(FIREBASE_DB_URL + 'records.json', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ lat, lng, ts: Date.now(), board: boardStr, rows: boardRows, cols: boardCols, clearedItems: clearedItems || [] })
      });
    } catch (e) {}
  }
}

async function loadRecords() {
  if (FIREBASE_DB_URL.includes('YOUR-PROJECT')) return [];
  try {
    const res = await fetch(FIREBASE_DB_URL + 'records.json');
    const data = await res.json();
    if (!data) return [];
    return Object.values(data).filter(r => r.ts != null).sort((a, b) => a.ts - b.ts);
  } catch (e) { return []; }
}

const NUM_COLORS = ['#0000ff','#009900','#ff0000','#000080','#800000','#008080','#000000','#808080'];

function buildWorldCell(ch, isMe, clickHandler) {
  const cell = document.createElement('div');
  cell.className = 'wc-cell';
  if (isMe) cell.classList.add('wc-me');

  if (ch === ' ' || ch === undefined) {
    cell.classList.add('wc-empty');
  } else if (ch === 'F') {
    cell.classList.add('wc-flagged');
    const img = document.createElement('img');
    img.src = './images/flag.png';
    img.alt = '';
    cell.appendChild(img);
  } else if (ch === 'X') {
    cell.classList.add('wc-revealed');
    const img = document.createElement('img');
    img.src = './images/bomb.png';
    img.alt = '';
    cell.appendChild(img);
  } else if (ch === '_') {
    cell.classList.add('wc-revealed');
  } else if (ch >= '1' && ch <= '8') {
    cell.classList.add('wc-revealed');
    cell.textContent = ch;
    cell.style.color = NUM_COLORS[+ch - 1] || '#000';
  }
  // '.' = unrevealed, default style

  if (clickHandler && !isMe && ch !== ' ') {
    cell.addEventListener('click', clickHandler);
  }
  return cell;
}

function renderDetailBoard(record) {
  const bRows = record.rows || 4;
  const bCols = record.cols || 4;
  const rowStrs = (record.board || '').split('|');

  const boardEl = document.createElement('div');
  boardEl.style.display = 'grid';
  boardEl.style.gridTemplateColumns = `repeat(${bCols}, 20px)`;

  for (let r = 0; r < bRows; r++) {
    const rowStr = rowStrs[r] || '';
    for (let c = 0; c < bCols; c++) {
      boardEl.appendChild(buildWorldCell(rowStr[c] || '.', false, null));
    }
  }
  return boardEl;
}

function showPlayerDetail(record) {
  const overlay = document.getElementById('player-detail-overlay');
  const body = document.getElementById('player-detail-body');
  const title = document.getElementById('player-detail-title');

  title.textContent = record.lat != null ? `${record.lat.toFixed(3)}, ${record.lng.toFixed(3)}` : 'Player';
  body.innerHTML = '';

  if (record.board) {
    body.appendChild(renderDetailBoard(record));
  }

  const items = record.clearedItems || [];
  items.forEach(item => {
    const row = document.createElement('div');
    row.className = 'cleared-item';

    const imgUrl = getImageUrl(item.img);
    if (imgUrl) {
      const img = document.createElement('img');
      img.className = 'cleared-item-img';
      img.src = imgUrl;
      img.alt = '';
      row.appendChild(img);
    }

    const info = document.createElement('div');
    info.className = 'cleared-item-info';

    if (item.name) {
      const name = document.createElement('div');
      name.className = 'cleared-item-name';
      name.textContent = item.name;
      info.appendChild(name);
    }
    if (item.text) {
      const text = document.createElement('div');
      text.className = 'cleared-item-text';
      text.textContent = item.text;
      info.appendChild(text);
    }
    if (item.role || item.type) {
      const role = document.createElement('div');
      role.className = 'cleared-item-role';
      role.textContent = [item.role, item.type].filter(Boolean).join(' / ');
      info.appendChild(role);
    }

    row.appendChild(info);
    body.appendChild(row);
  });

  overlay.classList.add('visible');
}

function showWorldScreen(records, myRecord) {
  const screen = document.getElementById('world-screen');
  screen.innerHTML = '';
  screen.classList.add('visible');

  const BR = myRecord.rows || rows;
  const BC = myRecord.cols || cols;

  // Build ordered players: others chronological, me at center
  const n = records.length + 1;
  const metaCols = Math.ceil(Math.sqrt(n));
  const metaRows = Math.ceil(n / metaCols);
  const myIdx = Math.floor((metaRows * metaCols) / 2);

  const slots = [];
  let otherIdx = 0;
  for (let i = 0; i < metaRows * metaCols; i++) {
    if (i === myIdx) {
      slots.push({ record: myRecord, isMe: true });
    } else {
      slots.push(otherIdx < records.length ? { record: records[otherIdx++], isMe: false } : null);
    }
  }

  const CELL = 20;
  const totalCols = metaCols * BC;
  const totalRows = metaRows * BR;

  const wrap = document.createElement('div');
  wrap.className = 'combined-board-wrap';

  const board = document.createElement('div');
  board.className = 'combined-board';
  board.style.gridTemplateColumns = `repeat(${totalCols}, ${CELL}px)`;

  for (let gr = 0; gr < totalRows; gr++) {
    for (let gc = 0; gc < totalCols; gc++) {
      const mrow = Math.floor(gr / BR);
      const mcol = Math.floor(gc / BC);
      const pidx = mrow * metaCols + mcol;
      const slot = slots[pidx];

      if (!slot) {
        const empty = document.createElement('div');
        empty.className = 'wc-cell wc-empty';
        board.appendChild(empty);
        continue;
      }

      const { record, isMe } = slot;
      const pRows = record.rows || BR;
      const pCols = record.cols || BC;
      const lr = gr % BR;
      const lc = gc % BC;
      const rowStrs = (record.board || '').split('|');
      const ch = (lr < pRows && lc < pCols) ? ((rowStrs[lr] || '')[lc] || '.') : ' ';

      board.appendChild(buildWorldCell(ch, isMe, isMe ? null : () => showPlayerDetail(record)));
    }
  }

  wrap.appendChild(board);
  screen.appendChild(wrap);

  // Scroll to my board
  const myMetaRow = Math.floor(myIdx / metaCols);
  const myMetaCol = myIdx % metaCols;
  const scrollX = myMetaCol * BC * CELL + (BC * CELL / 2) - window.innerWidth / 2;
  const scrollY = myMetaRow * BR * CELL + (BR * CELL / 2) - window.innerHeight / 2;
  setTimeout(() => {
    screen.scrollTo({ left: Math.max(0, scrollX), top: Math.max(0, scrollY), behavior: 'smooth' });
  }, 100);
}

async function showWinScreen() {
  const el = document.getElementById('win-message');
  const locText = userLocation
    ? `you are in ${userLocation.lat.toFixed(5)}, ${userLocation.lng.toFixed(5)}`
    : 'you are in unknown location';
  if (el) { el.textContent = locText; el.classList.add('visible'); }

  const boardStr = serializeBoard();
  const myRecord = {
    lat: userLocation ? userLocation.lat : null,
    lng: userLocation ? userLocation.lng : null,
    ts: Date.now(),
    board: boardStr,
    rows,
    cols
  };

  const clearedItems = getClearedItems();
  myRecord.clearedItems = clearedItems;

  if (userLocation) {
    await saveRecord(userLocation.lat, userLocation.lng, boardStr, rows, cols, clearedItems);
  }

  const allRecords = await loadRecords();
  const myTs = myRecord.ts;
  const otherRecords = allRecords.filter(r => Math.abs(r.ts - myTs) > 2000);

  setTimeout(() => {
    showWorldScreen(otherRecords, myRecord);
  }, 1500);
}

function generateGridFromCsv(count) {
  const blocks = Math.max(1, Math.ceil(count / 3));
  const gridSide = Math.max(1, Math.ceil(Math.sqrt(blocks)));
  const side = gridSide * 2;
  const mines = Math.max(3, Math.floor(side * side * 0.09));
  return { rows: side, cols: side, mines };
}

const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSy4u5g38yzruaKY4dT3KzIps8zHhBbJ_TTwKqSWLeRvkSZRrhRsii6hTZtsfcnhl79gyxdAodJ1BxW/pub?gid=2084734993&single=true&output=csv';
let csvItems = [];
const hoverPools = {
  flag: [],
  bomb: [],
  apply: [],
  number: []
};

function normalizeForm(value) {
  const normalized = String(value || '').trim().toLowerCase();
  if (!normalized) return null;
  if (normalized.includes('깃발') || normalized.includes('flag')) return 'flag';
  if (normalized.includes('지뢰') || normalized.includes('bomb') || normalized.includes('방해')) return 'bomb';
  if (normalized.includes('적용') || normalized.includes('apply')) return 'apply';
  if (normalized.includes('숫자') || normalized.includes('number') || normalized.includes('정보')) return 'number';
  return null;
}

function isDirectImageUrl(url) {
  return /\.(jpe?g|png|gif|webp|svg)(\?|$)/i.test(String(url || ''));
}

function getDrivePreviewUrl(url) {
  const stringUrl = String(url || '');
  const match = stringUrl.match(/\/file\/d\/([^\/]+)/) || stringUrl.match(/[?&]id=([^&]+)/);
  if (match) {
    return `https://drive.google.com/thumbnail?id=${match[1]}&sz=w300-h300`;
  }
  return null;
}

function getImageUrl(url) {
  if (!url) return '';
  if (isDirectImageUrl(url)) return url;
  const driveUrl = getDrivePreviewUrl(url);
  if (driveUrl) return driveUrl;
  return '';
}

function parseCsv(text) {
  const rows = text.trim().split(/\r?\n/).map(line => {
    const cells = [];
    let current = '';
    let insideQuotes = false;
    for (let i = 0; i < line.length; i++) {
      const char = line[i];
      if (char === '"') {
        insideQuotes = !insideQuotes;
      } else if (char === ',' && !insideQuotes) {
        cells.push(current.trim());
        current = '';
      } else {
        current += char;
      }
    }
    cells.push(current.trim());
    return cells;
  });

  const header = rows[0] || [];
  return rows.slice(1).map(cells => {
    const item = {};
    header.forEach((key, index) => {
      item[key.trim().toLowerCase()] = cells[index] || '';
    });
    return item;
  }).filter(item => item.name || item.text);
}

async function fetchCsvData() {
  try {
    const response = await fetch(csvUrl);
    const text = await response.text();
    return parseCsv(text);
  } catch (error) {
    return [];
  }
}

function buildHoverPools() {
  hoverPools.flag = [];
  hoverPools.bomb = [];
  hoverPools.apply = [];
  hoverPools.number = [];

  csvItems.forEach(item => {
    const category = normalizeForm(item.form || item.type || item.name);
    if (category && hoverPools[category]) {
      hoverPools[category].push(item);
    }
  });

  Object.keys(hoverPools).forEach(category => {
    if (hoverPools[category].length === 0) {
      hoverPools[category].push({
        name: category.toUpperCase(),
        text: `${category} 항목 정보가 없습니다.`,
        type: category,
        role: category,
        img: '',
        link: 'https://www.google.com'
      });
    }
  });
}

function selectHoverItem(category, r, c) {
  const pool = hoverPools[category] || [];
  if (pool.length === 0) {
    return {
      name: category.toUpperCase(),
      text: `${category} 항목 정보가 없습니다.`,
      type: category,
      role: category,
      img: '',
      link: 'https://www.google.com'
    };
  }
  const index = Math.abs((r * 31 + c * 17) % pool.length);
  return pool[index];
}

function assignCellHoverItems() {
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const cell = board[r][c];
      cell.hoverItems = {
        flag: selectHoverItem('flag', r, c),
        bomb: selectHoverItem('bomb', r, c),
        apply: selectHoverItem('apply', r, c),
        number: selectHoverItem('number', r, c)
      };
    }
  }
}

function getHoverItem(type, cell) {
  if (!cell || !cell.hoverItems) {
    return {
      name: 'NO DATA',
      text: 'CSV가 아직 로드되지 않았거나 항목이 없습니다.',
      type: 'unknown',
      role: 'unknown',
      img: '',
      link: 'https://www.google.com'
    };
  }
  return cell.hoverItems[type] || cell.hoverItems.flag;
}

let hoverCloseTimer = null;

  document.getElementById('hover-text').textContent = item.text || '';

let rows = 9;
let cols = 9;
let mineCount = 10;
let board = [];
let firstMove = true;
let flags = 0;
let gameOver = false;
let flagMode = false;
let currentHoverCell = null;

function startTimer() {
  // timer mode removed; no operation required
}

function stopTimer() {
  // timer mode removed; no operation required
}

function setMessage(text) {
  // status text is hidden; no user-facing description needed

function initGame(settings) {
  rows = settings.rows;
  cols = settings.cols;
  mineCount = settings.mines;
  firstMove = true;
  gameOver = false;
  flagMode = false;
  flags = 0;
  board = [];
  flagToggle.classList.remove('active');
  flagToggle.textContent = 'Flag: OFF';
  boardContainer.style.setProperty('--cols', cols);
  stopTimer();
  buildHoverPools();
  createBoard();
  assignCellHoverItems();
  renderBoard();
}

function createBoard() {
  for (let r = 0; r < rows; r++) {
    const row = [];
    for (let c = 0; c < cols; c++) {
      row.push({
        mine: false,
        adjacent: 0,
        revealed: false,
        flagged: false,
        hovered: false,
        hoverItems: {
          flag: null,
          bomb: null,
          apply: null,
          number: null
        }
      });
    }
    board.push(row);
  }
}

function getNeighbors(r, c) {
  const neighbors = [];
  for (let dr = -1; dr <= 1; dr++) {
    for (let dc = -1; dc <= 1; dc++) {
      if (dr === 0 && dc === 0) continue;
      const nr = r + dr;
      const nc = c + dc;
      if (nr >= 0 && nr < rows && nc >= 0 && nc < cols) {
        neighbors.push({ r: nr, c: nc });
      }
    }
  }
  return neighbors;
}

function plantMines(safeRow, safeCol) {
  let planted = 0;
  const safeCells = new Set();
  getNeighbors(safeRow, safeCol).forEach(({ r, c }) => safeCells.add(`${r},${c}`));
  safeCells.add(`${safeRow},${safeCol}`);

  while (planted < mineCount) {
    const r = Math.floor(Math.random() * rows);
    const c = Math.floor(Math.random() * cols);
    const key = `${r},${c}`;
    if (safeCells.has(key) || board[r][c].mine) continue;
    board[r][c].mine = true;
    planted += 1;
  }

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (board[r][c].mine) continue;
      board[r][c].adjacent = getNeighbors(r, c).filter(({ r: nr, c: nc }) => board[nr][nc].mine).length;
    }
  }
}

function revealCell(r, c) {
  if (gameOver) return;
  const cell = board[r][c];
  if (cell.revealed || cell.flagged) return;

  if (firstMove) {
    plantMines(r, c);
    startTimer();
    firstMove = false;
  }

  if (cell.mine) {
    cell.revealed = true;
    renderBoard();
    return;
  }

  if (cell.adjacent === 0) {
    floodReveal(r, c);
  } else {
    cell.revealed = true;
  }

  renderBoard();
}

function floodReveal(r, c) {
  const cell = board[r][c];
  if (cell.revealed || cell.flagged) return;
  cell.revealed = true;
  if (cell.adjacent !== 0) return;

  getNeighbors(r, c).forEach(({ r: nr, c: nc }) => {
    if (!board[nr][nc].revealed) {
      floodReveal(nr, nc);
    }
  });
}

function toggleFlag(r, c) {
  if (gameOver) return;
  const cell = board[r][c];
  if (cell.revealed && cell.mine) {
    cell.mine = false;
    cell.revealed = false;
    cell.flagged = true;
    cell.mineCleared = true;
    flags += 1;
    updateAdjacencies();
    renderBoard();
    if (countMinesRemaining() === 0) {
      gameOver = true;
      showWinScreen();
    }
    return;
  }
  if (cell.revealed) return;
  cell.flagged = !cell.flagged;
  flags += cell.flagged ? 1 : -1;
  updateFlagCount();
  renderBoard();
}

function updateFlagCount() {
  // mine count display removed
}

function revealAllMines(showAll = false) {
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const cell = board[r][c];
      if (cell.mine) {
        cell.revealed = true;
      }
      if (showAll && !cell.mine && cell.flagged) {
        cell.flagged = false;
      }
    }
  }
}

function updateAdjacencies() {
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (board[r][c].mine) continue;
      board[r][c].adjacent = getNeighbors(r, c).filter(({ r: nr, c: nc }) => board[nr][nc].mine).length;
    }
  }
}

function countMinesRemaining() {
  let count = 0;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (board[r][c].mine) count += 1;
    }
  }
  return count;
}

function revealAllCells() {
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      board[r][c].revealed = true;
    }
  }
}

function checkWin() {
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const cell = board[r][c];
      if (!cell.mine && !cell.revealed) {
        return false;
      }
    }
  }
  return true;
}

function renderBoard() {
  const mineCountEl = document.getElementById('mine-count');
  if (mineCountEl) mineCountEl.textContent = `Mines: ${countMinesRemaining()}  Flags: ${flags}`;
  boardContainer.innerHTML = '';
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const cell = board[r][c];
      const button = document.createElement('button');
      button.type = 'button';
      button.className = 'ms-cell';
      button.dataset.row = r;
      button.dataset.col = c;
      if (cell.revealed) {
        button.classList.add('revealed');
        if (cell.mine) {
          button.classList.add('mine');
          const img = document.createElement('img');
          img.src = './images/bomb.png';
          img.alt = 'bomb';
          img.style.width = '100%';
          img.style.height = '100%';
          button.appendChild(img);
        } else if (cell.adjacent > 0) {
          button.textContent = cell.adjacent;
          const colors = ['#0000ff', '#009900', '#ff0000', '#000080', '#800000', '#008080', '#000000', '#808080'];
          button.style.color = colors[cell.adjacent - 1] || '#000000';
        }
      } else if (cell.flagged) {
        button.classList.add('flagged');
        const img = document.createElement('img');
        img.src = './images/flag.png';
        img.alt = 'flag';
        img.style.width = '100%';
        img.style.height = '100%';
        button.appendChild(img);
      }
      boardContainer.appendChild(button);
    }
  }
}

boardContainer.addEventListener('click', (event) => {
  const cellButton = event.target.closest('.ms-cell');
  if (!cellButton || !boardContainer.contains(cellButton)) return;
  const r = Number(cellButton.dataset.row);
  const c = Number(cellButton.dataset.col);
  if (flagMode) {
    toggleFlag(r, c);
  } else {
    revealCell(r, c);
  }
});

boardContainer.addEventListener('contextmenu', (event) => {
  const cellButton = event.target.closest('.ms-cell');
  if (!cellButton || !boardContainer.contains(cellButton)) return;
  event.preventDefault();
  const r = Number(cellButton.dataset.row);
  const c = Number(cellButton.dataset.col);
  toggleFlag(r, c);
});

boardContainer.addEventListener('mouseover', (event) => {
  const cellButton = event.target.closest('.ms-cell');
  if (!cellButton || !boardContainer.contains(cellButton)) return;
  if (currentHoverCell === cellButton) return;
  currentHoverCell = cellButton;

  const r = Number(cellButton.dataset.row);
  const c = Number(cellButton.dataset.col);
  const cell = board[r][c];

  if (cell.hovered) return;

  let hoverType = null;
  if (cell.flagged) {
    hoverType = 'flag';
  } else if (cell.revealed) {
    if (cell.mine) {
      hoverType = 'bomb';
    } else if (cell.adjacent > 0) {
      hoverType = 'number';
    }
  }

  if (hoverType) {
    cell.hovered = true;
    const item = getHoverItem(hoverType, cell);
    showHoverInfo(item);
    const imgWrapper = addImageToStack(item);
    addToLog(item, imgWrapper, hoverType);
  }
});

function reorderStack() {
  const stack = document.getElementById('img-stack');
  const items = Array.from(stack.children);
  const n = items.length;
  items.forEach((item, i) => {
    const depth = n - 1 - i;
    item.style.bottom = `${depth * 10}px`;
    item.style.right = '0';
    item.style.zIndex = i + 1;
    item.style.transform = '';
  });
}

function addImageToStack(item) {
  const imageUrl = getImageUrl(item.img);
  if (!imageUrl) return null;
  const stack = document.getElementById('img-stack');
  const wrapper = document.createElement('div');
  wrapper.className = 'stack-img-wrap';
  const a = document.createElement('a');
  a.href = item.link || '#';
  a.target = '_blank';
  a.rel = 'noopener noreferrer';
  const img = document.createElement('img');
  img.src = imageUrl;
  img.alt = item.name || '';
  img.onerror = () => { wrapper.style.display = 'none'; };
  a.appendChild(img);
  wrapper.appendChild(a);
  stack.appendChild(wrapper);
  reorderStack();
  return wrapper;
}

let activeLogEntry = null;
const trackedKeys = new Set();

const typeColors = { bomb: '#cc0000', flag: '#cc0000', number: '#0000aa', apply: '#006600' };

function addToLog(item, imgWrapper, hoverType) {
  const key = (item.name || '') + '|' + (item.text || '');
  if (trackedKeys.has(key)) return;
  trackedKeys.add(key);
  const logPanel = document.getElementById('hover-log');
  const logList = document.getElementById('hover-log-list');
  const entry = document.createElement('div');
  entry.className = 'log-item active';
  entry.textContent = item.name || '(unnamed)';
  entry.title = item.text || '';
  entry.dataset.baseColor = typeColors[hoverType] || '#000';
  entry.style.color = typeColors[hoverType] || '#000';
  if (activeLogEntry) {
    activeLogEntry.classList.remove('active');
    activeLogEntry.style.color = activeLogEntry.dataset.baseColor || '#000';
  }
  activeLogEntry = entry;
  entry.addEventListener('click', () => {
    showHoverInfo(item);
    if (imgWrapper) {
      const stack = document.getElementById('img-stack');
      stack.appendChild(imgWrapper);
      reorderStack();
    }
    if (activeLogEntry) {
      activeLogEntry.classList.remove('active');
      activeLogEntry.style.color = activeLogEntry.dataset.baseColor || '#000';
    }
    activeLogEntry = entry;
    entry.classList.add('active');
  });
  logList.appendChild(entry);
  logPanel.classList.add('visible');
}

(function () {
  const logPanel = document.getElementById('hover-log');
  const titlebar = logPanel.querySelector('.log-titlebar');
  const toggleBtn = document.getElementById('log-toggle');

  toggleBtn.addEventListener('click', () => {
    const list = document.getElementById('hover-log-list');
    const hidden = list.classList.toggle('log-list-hidden');
    toggleBtn.textContent = hidden ? '▶' : '▼';
  });

  let dragging = false, ox = 0, oy = 0, startL = 0, startT = 0;
  titlebar.addEventListener('mousedown', (e) => {
    if (e.target === toggleBtn) return;
    dragging = true;
    ox = e.clientX; oy = e.clientY;
    startL = logPanel.offsetLeft; startT = logPanel.offsetTop;
    e.preventDefault();
  });
  document.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    logPanel.style.left = `${startL + e.clientX - ox}px`;
    logPanel.style.top = `${startT + e.clientY - oy}px`;
  });
  document.addEventListener('mouseup', () => { dragging = false; });
}());
