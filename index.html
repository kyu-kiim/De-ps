<body>
  <div class="scene">
    <div class="card" id="flip-card">
      <section class="page front">
        <div class="page-content">
          <div class="white-panel">
            <div class="minesweeper-panel">
              <div class="ms-controls">
                <button class="ms-button active" id="flag-toggle">Flag: ON</button>
              </div>
              <div id="ms-board" class="ms-board"></div>
            </div>
          </div>
        </div>
      </section>
    </div>
  </div>

<script>

const boardContainer = document.getElementById('ms-board');
const flagToggle = document.getElementById('flag-toggle');

const difficulties = {
  beginner: { rows: 9, cols: 9, mines: 10 },
};

function generateRandomGrid() {
  const rows = Math.floor(Math.random() * 11) + 20; // 20-30
  const cols = Math.floor(Math.random() * 11) + 20; // 20-30
  const mineRatio = 0.15; // ~15% mines
  const mines = Math.floor(rows * cols * mineRatio);
  return { rows, cols, mines };
}

let rows = 9;
let cols = 9;
let mineCount = 10;
let board = [];
let firstMove = true;
let flags = 0;
let gameOver = false;
let flagMode = false;

function startTimer() {
  // timer mode removed; no operation required
}

function stopTimer() {
  // timer mode removed; no operation required
}

function setMessage(text) {
  // status text is hidden; no user-facing description needed
}

function initGame(settings) {
  rows = settings.rows;
  cols = settings.cols;
  mineCount = settings.mines;
  firstMove = true;
  gameOver = false;
  flagMode = true;
  flags = 0;
  board = [];
  setMessage('Flag mode active');
  flagToggle.classList.add('active');
  flagToggle.textContent = 'Flag: ON';
  boardContainer.style.setProperty('--cols', cols);
  stopTimer();
  createBoard();
  renderBoard();
}

function createBoard() {
  for (let r = 0; r < rows; r++) {
    const row = [];
    for (let c = 0; c < cols; c++) {
      row.push({ mine: false, adjacent: 0, revealed: false, flagged: false });
    }
    board.push(row);
  }
}

function getNeighbors(r, c) {
  const neighbors = [];
  for (let dr = -1; dr <= 1; dr++) {
    for (let dc = -1; dc <= 1; dc++) {
      if (dr === 0 && dc === 0) continue;
      const nr = r + dr;
      const nc = c + dc;
      if (nr >= 0 && nr < rows && nc >= 0 && nc < cols) {
        neighbors.push({ r: nr, c: nc });
      }
    }
  }
  return neighbors;
}

function plantMines(safeRow, safeCol) {
  let planted = 0;
  const safeCells = new Set();
  getNeighbors(safeRow, safeCol).forEach(({ r, c }) => safeCells.add(`${r},${c}`));
  safeCells.add(`${safeRow},${safeCol}`);

  while (planted < mineCount) {
    const r = Math.floor(Math.random() * rows);
    const c = Math.floor(Math.random() * cols);
    const key = `${r},${c}`;
    if (safeCells.has(key) || board[r][c].mine) continue;
    board[r][c].mine = true;
    planted += 1;
  }

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (board[r][c].mine) continue;
      board[r][c].adjacent = getNeighbors(r, c).filter(({ r: nr, c: nc }) => board[nr][nc].mine).length;
    }
  }
}

function revealCell(r, c) {
  if (gameOver) return;
  const cell = board[r][c];
  if (cell.revealed || cell.flagged) return;

  if (firstMove) {
    plantMines(r, c);
    startTimer();
    firstMove = false;
  }

  cell.revealed = true;
  if (cell.mine) {
    gameOver = true;
    setMessage('Game Over');
    stopTimer();
    revealAllMines();
    renderBoard();
    return;
  }

  if (cell.adjacent === 0) {
    floodReveal(r, c);
  }

  if (checkWin()) {
    gameOver = true;
    setMessage('You Win!');
    stopTimer();
    revealAllMines(true);
  }

  renderBoard();
}

function floodReveal(r, c) {
  const cell = board[r][c];
  if (cell.revealed || cell.flagged) return;
  cell.revealed = true;
  if (cell.adjacent !== 0) return;

  getNeighbors(r, c).forEach(({ r: nr, c: nc }) => {
    if (!board[nr][nc].revealed) {
      floodReveal(nr, nc);
    }
  });
}

function toggleFlag(r, c) {
  if (gameOver) return;
  const cell = board[r][c];
  if (cell.revealed) return;
  cell.flagged = !cell.flagged;
  flags += cell.flagged ? 1 : -1;
  updateFlagCount();
  renderBoard();
}

function updateFlagCount() {
  // mine count display removed
}

function revealAllMines(showAll = false) {
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const cell = board[r][c];
      if (cell.mine) {
        cell.revealed = true;
      }
      if (showAll && !cell.mine && cell.flagged) {
        cell.flagged = false;
      }
    }
  }
}

function checkWin() {
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const cell = board[r][c];
      if (!cell.mine && !cell.revealed) {
        return false;
      }
    }
  }
  return true;
}

function renderBoard() {
  boardContainer.innerHTML = '';
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const cell = board[r][c];
      const button = document.createElement('button');
      button.type = 'button';
      button.className = 'ms-cell';
      button.dataset.row = r;
      button.dataset.col = c;
      if (cell.revealed) {
        button.classList.add('revealed');
        if (cell.mine) {
          button.classList.add('mine');
          const img = document.createElement('img');
          img.src = './images/bomb.png';
          img.alt = 'bomb';
          img.style.width = '100%';
          img.style.height = '100%';
          button.appendChild(img);
        } else if (cell.adjacent > 0) {
          button.textContent = cell.adjacent;
          const colors = ['#0000ff', '#009900', '#ff0000', '#000080', '#800000', '#008080', '#000000', '#808080'];
          button.style.color = colors[cell.adjacent - 1] || '#000000';
        }
      } else if (cell.flagged) {
        button.classList.add('flagged');
        const img = document.createElement('img');
        img.src = './images/flag.png';
        img.alt = 'flag';
        img.style.width = '100%';
        img.style.height = '100%';
        button.appendChild(img);
      }
      boardContainer.appendChild(button);
    }
  }
}

boardContainer.addEventListener('click', (event) => {
  const target = event.target;
  if (!target.classList.contains('ms-cell')) return;
  const r = Number(target.dataset.row);
  const c = Number(target.dataset.col);
  if (flagMode) {
    toggleFlag(r, c);
  } else {
    revealCell(r, c);
  }
});

boardContainer.addEventListener('contextmenu', (event) => {
  const target = event.target;
  if (!target.classList.contains('ms-cell')) return;
  event.preventDefault();
  const r = Number(target.dataset.row);
  const c = Number(target.dataset.col);
  toggleFlag(r, c);
});

initGame(generateRandomGrid());

flagToggle.addEventListener('click', () => {
  flagMode = !flagMode;
  flagToggle.classList.toggle('active', flagMode);
  flagToggle.textContent = flagMode ? 'Flag: ON' : 'Flag: OFF';
});
</script>
