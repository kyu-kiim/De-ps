<body>
  <div class="scene">
    <div class="card" id="flip-card">
      <section class="page front">
        <div class="page-content">
          <div class="white-panel">
            <div class="minesweeper-panel">
              <div class="ms-controls">
                <button class="ms-button active" id="flag-toggle">Flag: ON</button>
              </div>
              <div id="hover-info" class="hover-info">
                <div id="hover-name" class="hover-name">Hover over a cell</div>
                <div id="hover-text" class="hover-text">현재 CSV 데이터가 로드되면 이곳에 text 항목이 표시됩니다.</div>
                <div id="hover-type" class="hover-meta"></div>
                <div id="hover-role" class="hover-meta"></div>
              </div>
              <div id="ms-board" class="ms-board"></div>
              <div id="hover-link" class="hover-link">
                <a id="hover-search" href="https://www.google.com" target="_blank" rel="noopener noreferrer">
                  <img id="hover-image" src="" alt="hover image">
                </a>
              </div>
            </div>
          </div>
        </div>
      </section>
    </div>
  </div>

<script>

const boardContainer = document.getElementById('ms-board');
const flagToggle = document.getElementById('flag-toggle');

const difficulties = {
  beginner: { rows: 9, cols: 9, mines: 10 },
};

function generateRandomGrid() {
  const rows = Math.floor(Math.random() * 11) + 20; // 20-30
  const cols = Math.floor(Math.random() * 11) + 20; // 20-30
  const mineRatio = 0.15; // ~15% mines
  const mines = Math.max(30, Math.floor(rows * cols * mineRatio));
  return { rows, cols, mines };
}

const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSy4u5g38yzruaKY4dT3KzIps8zHhBbJ_TTwKqSWLeRvkSZRrhRsii6hTZtsfcnhl79gyxdAodJ1BxW/pub?gid=2084734993&single=true&output=csv';
let csvItems = [];
const hoverPools = {
  flag: [],
  bomb: [],
  apply: [],
  number: []
};

function normalizeForm(value) {
  const normalized = String(value || '').trim().toLowerCase();
  if (!normalized) return null;
  if (normalized.includes('깃발') || normalized.includes('flag')) return 'flag';
  if (normalized.includes('지뢰') || normalized.includes('bomb') || normalized.includes('방해')) return 'bomb';
  if (normalized.includes('적용') || normalized.includes('apply')) return 'apply';
  if (normalized.includes('숫자') || normalized.includes('number') || normalized.includes('정보')) return 'number';
  return null;
}

function parseCsv(text) {
  const rows = text.trim().split(/\r?\n/).map(line => {
    const cells = [];
    let current = '';
    let insideQuotes = false;
    for (let i = 0; i < line.length; i++) {
      const char = line[i];
      if (char === '"') {
        insideQuotes = !insideQuotes;
      } else if (char === ',' && !insideQuotes) {
        cells.push(current.trim());
        current = '';
      } else {
        current += char;
      }
    }
    cells.push(current.trim());
    return cells;
  });

  const header = rows[0] || [];
  return rows.slice(1).map(cells => {
    const item = {};
    header.forEach((key, index) => {
      item[key.trim().toLowerCase()] = cells[index] || '';
    });
    return item;
  }).filter(item => item.name || item.text);
}

async function fetchCsvData() {
  try {
    const response = await fetch(csvUrl);
    const text = await response.text();
    return parseCsv(text);
  } catch (error) {
    return [];
  }
}

function buildHoverPools() {
  hoverPools.flag = [];
  hoverPools.bomb = [];
  hoverPools.apply = [];
  hoverPools.number = [];

  csvItems.forEach(item => {
    const category = normalizeForm(item.form || item.type || item.name);
    if (category && hoverPools[category]) {
      hoverPools[category].push(item);
    }
  });

  Object.keys(hoverPools).forEach(category => {
    if (hoverPools[category].length === 0) {
      hoverPools[category].push({
        name: category.toUpperCase(),
        text: `${category} 항목 정보가 없습니다.`,
        type: category,
        role: category,
        img: '',
        link: 'https://www.google.com'
      });
    }
  });
}

function selectHoverItem(category, r, c) {
  const pool = hoverPools[category] || [];
  if (pool.length === 0) {
    return {
      name: category.toUpperCase(),
      text: `${category} 항목 정보가 없습니다.`,
      type: category,
      role: category,
      img: '',
      link: 'https://www.google.com'
    };
  }
  const index = Math.abs((r * 31 + c * 17) % pool.length);
  return pool[index];
}

function assignCellHoverItems() {
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const cell = board[r][c];
      cell.hoverItems = {
        flag: selectHoverItem('flag', r, c),
        bomb: selectHoverItem('bomb', r, c),
        apply: selectHoverItem('apply', r, c),
        number: selectHoverItem('number', r, c)
      };
    }
  }
}

function getHoverItem(type, cell) {
  if (!cell || !cell.hoverItems) {
    return {
      name: 'NO DATA',
      text: 'CSV가 아직 로드되지 않았거나 항목이 없습니다.',
      type: 'unknown',
      role: 'unknown',
      img: '',
      link: 'https://www.google.com'
    };
  }
  return cell.hoverItems[type] || cell.hoverItems.flag;
}

function showHoverInfo(item) {
  const hoverInfo = document.getElementById('hover-info');
  const hoverName = document.getElementById('hover-name');
  const hoverText = document.getElementById('hover-text');
  const hoverType = document.getElementById('hover-type');
  const hoverRole = document.getElementById('hover-role');
  const hoverSearch = document.getElementById('hover-search');
  const hoverImage = document.getElementById('hover-image');
  const hoverLink = document.getElementById('hover-link');

  hoverName.textContent = item.name || '';
  hoverText.textContent = item.text || '';
  hoverType.textContent = `Type: ${item.type || ''}`;
  hoverRole.textContent = `Role: ${item.role || ''}`;
  hoverSearch.href = item.link || 'https://www.google.com';

  if (item.img) {
    if (hoverImage.dataset.src !== item.img) {
      hoverImage.src = item.img;
      hoverImage.dataset.src = item.img;
    }
    hoverImage.alt = item.name || 'hover image';
    hoverLink.classList.add('visible');
  } else {
    hoverImage.src = '';
    hoverImage.dataset.src = '';
    hoverImage.alt = '';
    hoverLink.classList.remove('visible');
  }

  hoverInfo.classList.add('visible');
}

function hideHoverInfo() {
  document.getElementById('hover-info').classList.remove('visible');
  document.getElementById('hover-link').classList.remove('visible');
}

let rows = 9;
let cols = 9;
let mineCount = 10;
let board = [];
let firstMove = true;
let flags = 0;
let gameOver = false;
let flagMode = false;
let currentHoverCell = null;

function startTimer() {
  // timer mode removed; no operation required
}

function stopTimer() {
  // timer mode removed; no operation required
}

function setMessage(text) {
  // status text is hidden; no user-facing description needed
}

function initGame(settings) {
  rows = settings.rows;
  cols = settings.cols;
  mineCount = settings.mines;
  firstMove = true;
  gameOver = false;
  flagMode = true;
  flags = 0;
  board = [];
  setMessage('Flag mode active');
  flagToggle.classList.add('active');
  flagToggle.textContent = 'Flag: ON';
  boardContainer.style.setProperty('--cols', cols);
  stopTimer();
  buildHoverPools();
  createBoard();
  assignCellHoverItems();
  renderBoard();
}

function createBoard() {
  for (let r = 0; r < rows; r++) {
    const row = [];
    for (let c = 0; c < cols; c++) {
      row.push({
        mine: false,
        adjacent: 0,
        revealed: false,
        flagged: false,
        hoverItems: {
          flag: null,
          bomb: null,
          apply: null,
          number: null
        }
      });
    }
    board.push(row);
  }
}

function getNeighbors(r, c) {
  const neighbors = [];
  for (let dr = -1; dr <= 1; dr++) {
    for (let dc = -1; dc <= 1; dc++) {
      if (dr === 0 && dc === 0) continue;
      const nr = r + dr;
      const nc = c + dc;
      if (nr >= 0 && nr < rows && nc >= 0 && nc < cols) {
        neighbors.push({ r: nr, c: nc });
      }
    }
  }
  return neighbors;
}

function plantMines(safeRow, safeCol) {
  let planted = 0;
  const safeCells = new Set();
  getNeighbors(safeRow, safeCol).forEach(({ r, c }) => safeCells.add(`${r},${c}`));
  safeCells.add(`${safeRow},${safeCol}`);

  while (planted < mineCount) {
    const r = Math.floor(Math.random() * rows);
    const c = Math.floor(Math.random() * cols);
    const key = `${r},${c}`;
    if (safeCells.has(key) || board[r][c].mine) continue;
    board[r][c].mine = true;
    planted += 1;
  }

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (board[r][c].mine) continue;
      board[r][c].adjacent = getNeighbors(r, c).filter(({ r: nr, c: nc }) => board[nr][nc].mine).length;
    }
  }
}

function revealCell(r, c) {
  if (gameOver) return;
  const cell = board[r][c];
  if (cell.revealed || cell.flagged) return;

  if (firstMove) {
    plantMines(r, c);
    startTimer();
    firstMove = false;
  }

  cell.revealed = true;
  if (cell.mine) {
    gameOver = true;
    setMessage('Game Over');
    stopTimer();
    revealAllMines();
    renderBoard();
    return;
  }

  if (cell.adjacent === 0) {
    floodReveal(r, c);
  }

  if (checkWin()) {
    gameOver = true;
    setMessage('You Win!');
    stopTimer();
    revealAllMines(true);
  }

  renderBoard();
}

function floodReveal(r, c) {
  const cell = board[r][c];
  if (cell.revealed || cell.flagged) return;
  cell.revealed = true;
  if (cell.adjacent !== 0) return;

  getNeighbors(r, c).forEach(({ r: nr, c: nc }) => {
    if (!board[nr][nc].revealed) {
      floodReveal(nr, nc);
    }
  });
}

function toggleFlag(r, c) {
  if (gameOver) return;
  const cell = board[r][c];
  if (cell.revealed) return;
  cell.flagged = !cell.flagged;
  flags += cell.flagged ? 1 : -1;
  updateFlagCount();
  renderBoard();
}

function updateFlagCount() {
  // mine count display removed
}

function revealAllMines(showAll = false) {
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const cell = board[r][c];
      if (cell.mine) {
        cell.revealed = true;
      }
      if (showAll && !cell.mine && cell.flagged) {
        cell.flagged = false;
      }
    }
  }
}

function checkWin() {
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const cell = board[r][c];
      if (!cell.mine && !cell.revealed) {
        return false;
      }
    }
  }
  return true;
}

function renderBoard() {
  boardContainer.innerHTML = '';
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const cell = board[r][c];
      const button = document.createElement('button');
      button.type = 'button';
      button.className = 'ms-cell';
      button.dataset.row = r;
      button.dataset.col = c;
      if (cell.revealed) {
        button.classList.add('revealed');
        if (cell.mine) {
          button.classList.add('mine');
          const img = document.createElement('img');
          img.src = './bomb.png';
          img.alt = 'bomb';
          img.style.width = '100%';
          img.style.height = '100%';
          button.appendChild(img);
        } else if (cell.adjacent > 0) {
          button.textContent = cell.adjacent;
          const colors = ['#0000ff', '#009900', '#ff0000', '#000080', '#800000', '#008080', '#000000', '#808080'];
          button.style.color = colors[cell.adjacent - 1] || '#000000';
        }
      } else if (cell.flagged) {
        button.classList.add('flagged');
        const img = document.createElement('img');
        img.src = './images/flag.png';
        img.alt = 'flag';
        img.style.width = '100%';
        img.style.height = '100%';
        button.appendChild(img);
      }
      boardContainer.appendChild(button);
    }
  }
}

boardContainer.addEventListener('click', (event) => {
  const cellButton = event.target.closest('.ms-cell');
  if (!cellButton || !boardContainer.contains(cellButton)) return;
  const r = Number(cellButton.dataset.row);
  const c = Number(cellButton.dataset.col);
  if (flagMode) {
    toggleFlag(r, c);
  } else {
    revealCell(r, c);
  }
});

boardContainer.addEventListener('contextmenu', (event) => {
  const cellButton = event.target.closest('.ms-cell');
  if (!cellButton || !boardContainer.contains(cellButton)) return;
  event.preventDefault();
  const r = Number(cellButton.dataset.row);
  const c = Number(cellButton.dataset.col);
  toggleFlag(r, c);
});

boardContainer.addEventListener('mouseover', (event) => {
  const cellButton = event.target.closest('.ms-cell');
  if (!cellButton || !boardContainer.contains(cellButton)) return;
  if (currentHoverCell === cellButton) return;
  currentHoverCell = cellButton;

  const r = Number(cellButton.dataset.row);
  const c = Number(cellButton.dataset.col);
  const cell = board[r][c];
  let hoverType = null;

  if (cell.flagged) {
    hoverType = 'flag';
  } else if (cell.revealed) {
    if (cell.mine) {
      hoverType = 'bomb';
    } else if (cell.adjacent > 0) {
      hoverType = 'number';
    } else {
      hoverType = 'apply';
    }
  }

  if (hoverType) {
    showHoverInfo(getHoverItem(hoverType, cell));
  } else {
    hideHoverInfo();
  }
});

boardContainer.addEventListener('mouseout', (event) => {
  const cellButton = event.target.closest('.ms-cell');
  if (!cellButton || !boardContainer.contains(cellButton)) return;
  if (!event.relatedTarget || !cellButton.contains(event.relatedTarget)) {
    currentHoverCell = null;
    hideHoverInfo();
  }
});

fetchCsvData().then(items => {
  csvItems = items;
  initGame(generateRandomGrid());
});

flagToggle.addEventListener('click', () => {
  flagMode = !flagMode;
  flagToggle.classList.toggle('active', flagMode);
  flagToggle.textContent = flagMode ? 'Flag: ON' : 'Flag: OFF';
});
</script>
