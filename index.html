  <style type="text/css">
    body {
      margin: 0;
      padding: 0;

}

.bg-box {
  position: fixed;
  top: 50%;
  left: 50%;

  width: 400px;
  height: 400px;
  background: black;

  transform: translate(-50%, -50%) rotateX(45deg) rotateZ(0deg);
  transform-style: preserve-3d;

  animation: spin 8s linear infinite;

  z-index: -1; /* 배경으로 */
}

@keyframes spin {
  from {
    transform: translate(-50%, -50%) rotateX(45deg) rotateZ(0deg);
  }
  to {
    transform: translate(-50%, -50%) rotateX(45deg) rotateZ(360deg);
  }
}
    h1 {
      margin: 0;
      padding: 20px;
      color: blue;
      text-align: center;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: white;
      z-index: 1000;
      font-size: 60px;
    }
  </style>
</head>
<body>
  <div class="bg-box"></div>
  <!--웹 타이틀!-->
<h1>DE-PS</h1>

</body>
